<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — KampusKu</title>
  <link rel="stylesheet" href="login.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>

<div class="login-container">
  <div class="login-card">

    <div class="login-logo">
      <span class="glyph">&#9672;</span>
      <h1>KampusKu</h1>
      <p>Dashboard Mahasiswa</p>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Daftar</button>
      <div class="tab-indicator" id="tabIndicator"></div>
    </div>

    <!-- LOGIN FORM -->
    <div id="formLogin" class="form-section active">
      <div class="input-wrap">
        <i class="fa fa-envelope"></i>
        <input type="email" id="loginEmail" placeholder="Email"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="loginPass" placeholder="Password"/>
      </div>
      <button class="btn-main" onclick="loginEmail()">
        <i class="fa fa-right-to-bracket"></i> Masuk
      </button>
      <div id="loginErr" class="err-msg"></div>
    </div>

    <!-- REGISTER FORM -->
    <div id="formRegister" class="form-section">
      <div class="input-wrap">
        <i class="fa fa-user"></i>
        <input type="text" id="regNama" placeholder="Nama Lengkap"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-id-card"></i>
        <input type="text" id="regNpm" placeholder="NPM"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-envelope"></i>
        <input type="email" id="regEmail" placeholder="Email"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="regPass" placeholder="Password (min 6 karakter)"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="regPass2" placeholder="Ulangi Password"/>
      </div>
      <button class="btn-main" onclick="registerEmail()">
        <i class="fa fa-user-plus"></i> Buat Akun
      </button>
      <div id="regErr" class="err-msg"></div>
    </div>

    <!-- DIVIDER -->
    <div class="divider"><span>atau lanjutkan dengan</span></div>

    <!-- SOCIAL BUTTONS -->
    <div class="social-btns">
      <button class="btn-social btn-google" onclick="loginGoogle()">
        <svg class="social-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google
      </button>
      <button class="btn-social btn-facebook" onclick="loginFacebook()">
        <svg class="social-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#ffffff" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        Facebook
      </button>
    </div>

    <!-- Loading overlay (inside card) -->
    <div id="loadingOverlay" class="loading-overlay">
      <div class="spinner"></div>
      <span id="loadingText">Memproses...</span>
    </div>

  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
const auth = firebase.auth();
const db   = firebase.firestore();

/* ---- Tab switch ---- */
function switchTab(tab) {
  document.getElementById('formLogin').classList.toggle('active', tab === 'login');
  document.getElementById('formRegister').classList.toggle('active', tab === 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  document.getElementById('tabIndicator').style.transform =
    tab === 'login' ? 'translateX(0)' : 'translateX(100%)';
  document.getElementById('loginErr').textContent = '';
  document.getElementById('regErr').textContent = '';
}

/* ---- Loading ---- */
function showLoading(msg) {
  document.getElementById('loadingText').textContent = msg || 'Memproses...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

/* ---- Error map ---- */
const ERR = {
  'auth/user-not-found':       'Email tidak terdaftar',
  'auth/wrong-password':       'Password salah',
  'auth/invalid-email':        'Format email tidak valid',
  'auth/too-many-requests':    'Terlalu banyak percobaan, coba lagi nanti',
  'auth/email-already-in-use': 'Email sudah terdaftar',
  'auth/weak-password':        'Password terlalu lemah (min 6 karakter)',
  'auth/popup-closed-by-user': '',
  'auth/cancelled-popup-request': '',
  'auth/account-exists-with-different-credential':
    'Akun ini sudah terdaftar dengan metode lain. Coba login dengan email/password.',
  'auth/popup-blocked':
    'Popup diblokir. Izinkan popup untuk situs ini lalu coba lagi.',
};
function fmtErr(code) { return ERR[code] !== undefined ? ERR[code] : 'Terjadi kesalahan, coba lagi.'; }

/* ---- Save profile first time (social login) ---- */
async function saveProfileIfNew(user, extra) {
  const ref = db.collection('users').doc(user.uid).collection('profil').doc('data');
  const snap = await ref.get();
  if (!snap.exists) {
    await ref.set({
      nama: (extra && extra.nama) || user.displayName || '',
      npm:  (extra && extra.npm)  || '',
      foto: user.photoURL || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }
}

function goToDashboard() { window.location.href = 'dashboard.html'; }

/* ---- Email login ---- */
async function loginEmail() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Email dan password wajib diisi'; return; }
  showLoading('Masuk...');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    goToDashboard();
  } catch(e) { hideLoading(); err.textContent = fmtErr(e.code); }
}

/* ---- Email register ---- */
async function registerEmail() {
  const nama  = document.getElementById('regNama').value.trim();
  const npm   = document.getElementById('regNpm').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  const err   = document.getElementById('regErr');
  err.textContent = '';
  if (!nama || !email || !pass) { err.textContent = 'Nama, email, dan password wajib diisi'; return; }
  if (pass !== pass2) { err.textContent = 'Password tidak sama'; return; }
  if (pass.length < 6) { err.textContent = 'Password minimal 6 karakter'; return; }
  showLoading('Membuat akun...');
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: nama });
    await saveProfileIfNew(cred.user, { nama, npm });
    goToDashboard();
  } catch(e) { hideLoading(); err.textContent = fmtErr(e.code); }
}

/* ---- Google login ---- */
async function loginGoogle() {
  showLoading('Membuka Google...');
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope('email');
  provider.addScope('profile');
  try {
    const result = await auth.signInWithPopup(provider);
    await saveProfileIfNew(result.user);
    goToDashboard();
  } catch(e) {
    hideLoading();
    const msg = fmtErr(e.code);
    if (msg) document.getElementById('loginErr').textContent = msg;
  }
}

/* ---- Facebook login ---- */
async function loginFacebook() {
  showLoading('Membuka Facebook...');
  const provider = new firebase.auth.FacebookAuthProvider();
  provider.addScope('email');
  provider.addScope('public_profile');
  try {
    const result = await auth.signInWithPopup(provider);
    await saveProfileIfNew(result.user);
    goToDashboard();
  } catch(e) {
    hideLoading();
    const msg = fmtErr(e.code);
    if (msg) document.getElementById('loginErr').textContent = msg;
  }
}

/* ---- Already logged in? Skip to dashboard ---- */
auth.onAuthStateChanged(user => { if (user) goToDashboard(); });

/* ---- Enter key on login form ---- */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('formLogin').classList.contains('active')) loginEmail();
    else registerEmail();
  }
});

/* ---- Animated background particles ---- */
(function() {
  const c = document.getElementById('bgParticles');
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left   = Math.random() * 100 + 'vw';
    p.style.top    = Math.random() * 100 + 'vh';
    p.style.width  = (2 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration  = (4 + Math.random() * 7) + 's';
    p.style.animationDelay     = (Math.random() * 5) + 's';
    p.style.opacity            = (0.08 + Math.random() * 0.25).toString();
    c.appendChild(p);
  }
})();
</script>
</body>
</html>
