<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — KampusKu</title>
  <link rel="stylesheet" href="css/register.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

<div class="register-container">
  <div class="register-card">
    <div class="reg-logo">
      <span>◈</span>
    </div>
    <h2>Buat Akun Baru</h2>
    <p class="subtitle">Isi data di bawah untuk mendaftar</p>

    <div class="reg-grid">
      <div class="input-wrap full">
        <i class="fa fa-user"></i>
        <input type="text" id="nama" placeholder="Nama Lengkap"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-id-card"></i>
        <input type="text" id="npm" placeholder="NPM"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-calendar"></i>
        <input type="date" id="tglLahir"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-school"></i>
        <input type="text" id="smp" placeholder="Asal SMP/MTs"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-building-columns"></i>
        <input type="text" id="sma" placeholder="Asal SMA/MA"/>
      </div>
      <div class="input-wrap full">
        <i class="fa fa-location-dot"></i>
        <input type="text" id="alamat" placeholder="Alamat"/>
      </div>
      <div class="input-wrap full">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Email"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="password" placeholder="Password (min 6 karakter)"/>
      </div>
      <div class="input-wrap">
        <i class="fa fa-lock"></i>
        <input type="password" id="password2" placeholder="Ulangi Password"/>
      </div>
    </div>

    <button onclick="register()">Daftar Sekarang</button>
    <div id="regErr"></div>

    <p class="login-link">
      Sudah punya akun? <a href="index.html">Masuk di sini</a>
    </p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script>
function register() {
  const nama     = document.getElementById('nama').value.trim();
  const npm      = document.getElementById('npm').value.trim();
  const tglLahir = document.getElementById('tglLahir').value;
  const smp      = document.getElementById('smp').value.trim();
  const sma      = document.getElementById('sma').value.trim();
  const alamat   = document.getElementById('alamat').value.trim();
  const email    = document.getElementById('email').value.trim();
  const pass     = document.getElementById('password').value;
  const pass2    = document.getElementById('password2').value;
  const err      = document.getElementById('regErr');
  err.textContent = '';

  if (!nama || !npm || !email || !pass) { err.textContent = 'Nama, NPM, email, password wajib diisi'; return; }
  if (pass !== pass2) { err.textContent = 'Password tidak sama'; return; }
  if (pass.length < 6) { err.textContent = 'Password minimal 6 karakter'; return; }

  firebase.auth().createUserWithEmailAndPassword(email, pass)
    .then(async res => {
      await firebase.firestore()
        .collection('users').doc(res.user.uid)
        .collection('profil').doc('data')
        .set({ nama, npm, tgl: tglLahir, smp, sma, alamat, foto: '', createdAt: firebase.firestore.FieldValue.serverTimestamp() });
      window.location.href = 'dashboard.html';
    })
    .catch(e => {
      const msgs = {
        'auth/email-already-in-use': 'Email sudah terdaftar',
        'auth/invalid-email': 'Format email tidak valid',
        'auth/weak-password': 'Password terlalu lemah',
      };
      err.textContent = msgs[e.code] || e.message;
    });
}
</script>
</body>
</html>
